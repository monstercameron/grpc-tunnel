name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_call:  # Allow this workflow to be called by other workflows

permissions:
  contents: read

env:
  GOSEC_VERSION: v2.25.0
  GOVULNCHECK_VERSION: v1.1.4
  GOLANGCI_LINT_VERSION: v1.64.8
  PLAYWRIGHT_GO_VERSION: v0.5200.1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24.x"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run quality gates
        run: go run ./tools/runner.go quality
        env:
          RUNNER_STRICT_RACE: "1"

      - name: Upload quality gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-summary-go${{ matrix.go-version }}
          path: ./bin/quality/summary.json
          if-no-files-found: ignore

      - name: Run edge case tests
        run: go test ./pkg/... -v -run "Edge|Mock" -timeout 2m

      - name: Run fuzz tests (seed corpus only)
        run: |
          # Run each fuzzer briefly to validate seed corpus.
          go test ./pkg/bridge -v -fuzz=FuzzWebSocketConnWrite -fuzztime=5s
          go test ./pkg/bridge -v -fuzz=FuzzWebSocketConnRead -fuzztime=5s
          go test ./pkg/bridge -v -fuzz=FuzzBinaryMessage -fuzztime=5s
          go test ./pkg/bridge -v -fuzz=FuzzMessageSizes -fuzztime=5s

      - name: Install Playwright
        run: |
          go run github.com/playwright-community/playwright-go/cmd/playwright@${{ env.PLAYWRIGHT_GO_VERSION }} install --with-deps chromium

      - name: Run e2e tests
        run: go test ./e2e/... -v -timeout 5m
        env:
          CI: true

      - name: Run e2e negative tests
        run: go test ./e2e/... -v -run "Negative|Server|Rapid|Invalid|Max|Network" -timeout 5m

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.txt
          flags: unittests
          name: codecov-ubuntu-go${{ matrix.go-version }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --config=.golangci.yml --timeout=5m

  # Gosec scans Go code for security vulnerabilities.
  # Build fails on HIGH severity + HIGH confidence findings.
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Run security scanners
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

          echo "Security scan: checking HIGH severity + HIGH confidence findings"
          # Keep generated-code exception for G103 in broad scan.
          gosec -severity=high -confidence=high -exclude=G103 ./...
          # Enforce G103 in first-party code paths where unsafe usage is not expected.
          gosec -severity=high -confidence=high -include=G103 ./pkg/... ./examples/... ./e2e/... ./tools/...

          echo "Running govulncheck for reachable vulnerabilities"
          govulncheck ./...
