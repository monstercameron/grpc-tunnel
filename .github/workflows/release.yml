name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release Assets
    runs-on: ubuntu-latest
    environment:
      name: gogrpcbridge-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate changelog entry exists for tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "Missing CHANGELOG section for $VERSION"
            exit 1
          fi

      - name: Extract changelog notes for tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          awk '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            $0 ~ "^## \\[" && capture { capture=0 }
            capture { print }
          ' version="$VERSION" CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No release notes extracted for $VERSION"
            exit 1
          fi

      - name: Run release quality gate
        run: go run ./tools/runner.go quality
        env:
          RUNNER_STRICT_RACE: "1"

      - name: Run release benchmark trend gate
        run: go run ./tools/runner.go quality-trend

      - name: Run release security gates
        run: |
          go run github.com/securego/gosec/v2/cmd/gosec@latest -severity high -confidence high -exclude G103 ./...
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts-${{ steps.version.outputs.value }}
          path: |
            ./bin/quality/summary.json
            ./bin/quality/trend.json
          if-no-files-found: error

      - name: Compile verification gate
        run: go test ./... -run '^$'

      - name: Build release artifacts
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          mkdir -p dist

          go build -trimpath -ldflags="-s -w" \
            -o "dist/GoGRPCBridge-bridge-${VERSION}-linux-amd64" ./examples/direct-bridge

          go build -trimpath -ldflags="-s -w" \
            -o "dist/GoGRPCBridge-grpc-server-${VERSION}-linux-amd64" ./examples/grpc-server

          GOOS=js GOARCH=wasm go build -trimpath \
            -o "dist/GoGRPCBridge-wasm-client-${VERSION}.wasm" ./examples/wasm-client

          tar -czf "dist/GoGRPCBridge-examples-${VERSION}-linux-amd64.tar.gz" \
            -C dist "GoGRPCBridge-bridge-${VERSION}-linux-amd64" "GoGRPCBridge-grpc-server-${VERSION}-linux-amd64"

          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Release ${{ steps.version.outputs.value }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*
          draft: false
          prerelease: false
